apiVersion: v1
kind: ServiceAccount
metadata:
  name: exos-wireguard-controller
  namespace: exos-control-plane
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: exos-wireguard-controller
  namespace: exos-control-plane
  labels:
    app.kubernetes.io/name: exos-wireguard-controller
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: exos-wireguard-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: exos-wireguard-controller
    spec:
      serviceAccountName: exos-wireguard-controller
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        exos.tech/wireguard-gateway: "true"
      containers:
        - name: wireguard-controller
          image: ghcr.io/exos-tech/control-plane-wireguard-controller:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
            privileged: false
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: exos-control-plane-db
                  key: database-url
            - name: WG_GATEWAY_ID
              value: wg-control-plane-1
            - name: WG_RECONCILE_INTERVAL
              value: 15s
          volumeMounts:
            - name: tun
              mountPath: /dev/net/tun
      volumes:
        - name: tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
